<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AeroPress Optimizer UI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/webapp.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel controls" data-controls-panel>
        <div class="controls-topbar" data-controls-toggle>
          <div>
            <span class="eyebrow">Local Web UI</span>
            <h2 class="section-title">沖煮參數設定</h2>
          </div>
          <div class="mobile-only toggle-icon" style="display: none; font-size: 1.2rem; color: var(--accent);">
            <style>
              @media (max-width: 640px) {
                .mobile-only.toggle-icon { display: block !important; }
                .is-collapsed .toggle-icon { transform: rotate(180deg); transition: transform 0.3s; }
                .toggle-icon { transition: transform 0.3s; }
              }
            </style>
            ▾
          </div>
        </div>
        <div class="controls-body" data-controls-body>
          <form id="optimize-form">
          <div class="grid">
            <div class="field" data-help-key="brewer">
              <div class="label-row">
                <label for="brewer">器材尺寸</label>
                <button class="hint-button" type="button" data-help-target="brewer">?</button>
              </div>
              <select id="brewer" name="brewer">
                {% for brewer in brewer_options %}
                <option value="{{ brewer }}">{{ brewer }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field" data-help-key="roast">
              <div class="label-row">
                <label for="roast">焙度</label>
                <button class="hint-button" type="button" data-help-target="roast">?</button>
              </div>
              <select id="roast" name="roast">
                {% for opt in roast_options %}
                <option value="{{ opt.code }}" {% if opt.code == 'medium' %}selected{% endif %}>{{ opt.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field full" data-help-key="preset">
              <div class="label-row">
                <label for="preset">水質預設</label>
                <button class="hint-button" type="button" data-help-target="preset">?</button>
              </div>
              <select id="preset" name="preset">
                <option value="">手動輸入</option>
                {% for key, preset in presets.items() %}
                <option value="{{ key }}">{{ preset.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field" data-help-key="gh">
              <div class="label-row">
                <label for="gh">GH</label>
                <button class="hint-button" type="button" data-help-target="gh">?</button>
              </div>
              <input id="gh" name="gh" type="number" step="0.1" value="50">
            </div>
            <div class="field" data-help-key="kh">
              <div class="label-row">
                <label for="kh">KH</label>
                <button class="hint-button" type="button" data-help-target="kh">?</button>
              </div>
              <input id="kh" name="kh" type="number" step="0.1" value="30">
            </div>
            <div class="field" data-help-key="mg_frac">
              <div class="label-row">
                <label for="mg_frac">Mg 比例</label>
                <button class="hint-button" type="button" data-help-target="mg_frac">?</button>
              </div>
              <input id="mg_frac" name="mg_frac" type="number" step="0.01" min="0" max="1" value="0.40">
            </div>
            <div class="field" data-help-key="top">
              <div class="label-row">
                <label for="top">Top N</label>
                <button class="hint-button" type="button" data-help-target="top">?</button>
              </div>
              <input id="top" name="top" type="number" min="1" max="10" value="3">
            </div>
            <div class="field" data-help-key="t_env">
              <div class="label-row">
                <label for="t_env">環境溫度 C</label>
                <button class="hint-button" type="button" data-help-target="t_env">?</button>
              </div>
              <input id="t_env" name="t_env" type="number" step="0.1" value="25">
            </div>

            <div class="field full" data-help-key="altitude">
              <div class="label-row">
                <label for="altitude">海拔 m</label>
                <button class="hint-button" type="button" data-help-target="altitude">?</button>
              </div>
              <input id="altitude" name="altitude" type="number" step="1" value="0">
            </div>
          </div>

          <button id="submit-button" class="primary-button" type="submit">開始最佳化</button>
          </form>

          <aside id="tooltip-card" class="tooltip-card" aria-live="polite">
            <h3 id="tooltip-title">欄位說明</h3>
            <p id="tooltip-body">點選任一欄位或右側問號，可查看該參數的用途與建議範圍。</p>
            <div id="tooltip-meta" class="tooltip-meta">提示會跟著目前聚焦的欄位更新。</div>
          </aside>
        </div>
      </section>

      <section class="panel">
        <div class="hero">
          <span class="eyebrow">AeroPress 4-Vector</span>
          <h1>把 CLI 變成可視化沖煮台</h1>
        </div>



        <div id="results" class="results">
          <div class="empty">尚未執行最佳化。</div>
        </div>
      </section>
    </main>

    <div id="radar-modal" class="modal" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="radar-modal-title">
        <div class="modal-head">
          <div>
            <span class="eyebrow">Flavor Radar</span>
            <h2 id="radar-modal-title">風味雷達圖與參數說明</h2>
            <p class="muted">比較前三名沖煮組合在六個風味向量上的相對強度。</p>
          </div>
          <button id="radar-close" class="modal-close" type="button" aria-label="關閉">×</button>
        </div>
        <div class="modal-body">
          <div id="radar" class="radar-wrap"></div>
          <div id="radar-legend" class="radar-legend"></div>
        </div>
      </div>
    </div>

    <script>
      window.APP_PRESETS = {{ presets|tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/webapp.js') }}" defer></script>
  </body>
</html>
