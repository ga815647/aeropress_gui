<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AeroPress Optimizer UI</title>
    <style>
      :root {
        --bg: #f5efe4;
        --paper: #fffaf0;
        --ink: #1f1a17;
        --muted: #6d6358;
        --accent: #bb5f2a;
        --accent-soft: #f2caa8;
        --line: #d8c7b7;
        --shadow: 0 24px 60px rgba(88, 55, 33, 0.14);
        --tooltip-shadow: 0 18px 40px rgba(79, 41, 18, 0.18);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Noto Sans TC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #ffe8c7 0, transparent 30%),
          radial-gradient(circle at bottom right, #f3d2bb 0, transparent 25%),
          linear-gradient(135deg, #f3ebdf 0%, #e7d6c5 100%);
      }
      .shell {
        width: min(1160px, calc(100vw - 32px));
        margin: 24px auto 40px;
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 20px;
      }
      .panel {
        background: rgba(255, 250, 240, 0.88);
        border: 1px solid rgba(216, 199, 183, 0.9);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }
      .controls {
        padding: 24px;
        position: sticky;
        top: 24px;
        align-self: start;
      }
      .hero {
        padding: 22px 24px 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.55rem, 2.2vw, 2.45rem);
        line-height: 1.02;
        letter-spacing: -0.03em;
      }
      h2, h3, p, label, select, input, button {
        font-size: 14px;
      }
      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        background: var(--accent-soft);
        border-radius: 999px;
        font-weight: 600;
        margin-bottom: 14px;
      }
      .muted { color: var(--muted); }
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
      }
      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }
      .field.full { grid-column: 1 / -1; }
      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .hint-button {
        border: 0;
        width: 22px;
        min-width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        padding: 0;
        cursor: pointer;
      }
      .hint-button:hover {
        filter: brightness(0.96);
      }
      select, input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 11px 12px;
        background: #fffdf9;
        color: var(--ink);
      }
      select:focus, input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(187, 95, 42, 0.14);
      }
      .primary-button {
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 14px 16px;
        background: linear-gradient(135deg, #cb6d34, #9f471f);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .primary-button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .tooltip-card {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px;
        background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(247,234,221,0.92));
        box-shadow: var(--tooltip-shadow);
      }
      .tooltip-card h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      .tooltip-card p {
        margin: 0 0 8px;
        line-height: 1.5;
      }
      .tooltip-meta {
        color: var(--muted);
        font-size: 12px;
      }
      .results { display: grid; gap: 18px; }
      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }
      .chip {
        background: rgba(255,255,255,0.7);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px;
      }
      .result-card {
        border-top: 1px solid var(--line);
        padding: 18px 24px 22px;
      }
      .result-card:first-of-type { border-top: 0; }
      .result-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 12px;
      }
      .result-head h2 {
        font-size: clamp(1.1rem, 1.5vw, 1.4rem);
        line-height: 1.15;
      }
      .score { font-size: 1.65rem; font-weight: 800; color: var(--accent); }
      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin: 10px 0 14px;
      }
      .metric, .ratio, .compound {
        background: rgba(255,255,255,0.72);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 10px;
      }
      .compound-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }
      .compound-note {
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.45;
        font-size: 12px;
      }
      .radar-trigger-wrap {
        margin: 0 24px 20px;
      }
      .radar-trigger {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.72);
        color: var(--ink);
        text-align: left;
        cursor: pointer;
      }
      .radar-trigger strong {
        display: block;
        margin-bottom: 4px;
        font-size: 15px;
      }
      .radar-trigger:hover {
        border-color: rgba(187, 95, 42, 0.45);
        box-shadow: 0 10px 24px rgba(88, 55, 33, 0.08);
      }
      .modal[hidden] {
        display: none;
      }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(31, 26, 23, 0.42);
      }
      .modal-panel {
        width: min(920px, 100%);
        max-height: min(88vh, 920px);
        overflow: auto;
        background: rgba(255, 250, 240, 0.98);
        border: 1px solid rgba(216, 199, 183, 0.95);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }
      .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
        padding: 22px 24px 14px;
      }
      .modal-head h2 {
        margin: 4px 0 0;
        font-size: 1.35rem;
      }
      .modal-close {
        border: 0;
        border-radius: 999px;
        width: 34px;
        height: 34px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 18px;
        font-weight: 800;
        cursor: pointer;
      }
      .modal-body {
        padding: 0 24px 24px;
      }
      .radar-wrap {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255,255,255,0.72);
        padding: 16px 18px 12px;
      }
      #radar svg {
        width: min(100%, 520px);
        height: auto;
        display: block;
        margin: 0 auto;
      }
      .radar-legend {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      .legend-item {
        background: rgba(255,255,255,0.72);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px;
      }
      .legend-item strong {
        display: inline-block;
        margin-bottom: 6px;
      }
      .empty {
        padding: 28px;
        border-top: 1px solid var(--line);
        color: var(--muted);
      }
      @media (max-width: 980px) {
        .shell { grid-template-columns: 1fr; }
        .controls { position: static; }
        .radar-trigger-wrap { margin: 0 20px 20px; }
        .radar-legend { grid-template-columns: 1fr; }
        .summary, .metrics, .compound-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 640px) {
        .hero,
        .result-card { padding-left: 18px; padding-right: 18px; }
        .radar-trigger-wrap { margin: 0 18px 18px; }
        .modal-head,
        .modal-body { padding-left: 18px; padding-right: 18px; }
        .grid, .summary, .metrics, .compound-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel controls">
        <span class="eyebrow">Local Web UI</span>
        <h2 style="margin-top:0">沖煮參數</h2>
        <form id="optimize-form">
          <div class="grid">
            <div class="field" data-help-key="brewer">
              <div class="label-row">
                <label for="brewer">機型</label>
                <button class="hint-button" type="button" data-help-target="brewer">?</button>
              </div>
              <select id="brewer" name="brewer">
                {% for brewer in brewer_options %}
                <option value="{{ brewer }}">{{ brewer }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field" data-help-key="roast">
              <div class="label-row">
                <label for="roast">焙度</label>
                <button class="hint-button" type="button" data-help-target="roast">?</button>
              </div>
              <select id="roast" name="roast">
                {% for roast in roast_codes %}
                <option value="{{ roast }}" {% if roast == 'M' %}selected{% endif %}>{{ roast }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field full" data-help-key="preset">
              <div class="label-row">
                <label for="preset">水質快選</label>
                <button class="hint-button" type="button" data-help-target="preset">?</button>
              </div>
              <select id="preset" name="preset">
                <option value="">手動輸入</option>
                {% for key, preset in presets.items() %}
                <option value="{{ key }}">{{ preset.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field" data-help-key="gh">
              <div class="label-row">
                <label for="gh">GH</label>
                <button class="hint-button" type="button" data-help-target="gh">?</button>
              </div>
              <input id="gh" name="gh" type="number" step="0.1" value="50">
            </div>
            <div class="field" data-help-key="kh">
              <div class="label-row">
                <label for="kh">KH</label>
                <button class="hint-button" type="button" data-help-target="kh">?</button>
              </div>
              <input id="kh" name="kh" type="number" step="0.1" value="30">
            </div>
            <div class="field" data-help-key="mg_frac">
              <div class="label-row">
                <label for="mg_frac">Mg 比例</label>
                <button class="hint-button" type="button" data-help-target="mg_frac">?</button>
              </div>
              <input id="mg_frac" name="mg_frac" type="number" step="0.01" min="0" max="1" value="0.40">
            </div>
            <div class="field" data-help-key="top">
              <div class="label-row">
                <label for="top">Top N</label>
                <button class="hint-button" type="button" data-help-target="top">?</button>
              </div>
              <input id="top" name="top" type="number" min="1" max="10" value="3">
            </div>
            <div class="field" data-help-key="t_env">
              <div class="label-row">
                <label for="t_env">室溫 °C</label>
                <button class="hint-button" type="button" data-help-target="t_env">?</button>
              </div>
              <input id="t_env" name="t_env" type="number" step="0.1" value="25">
            </div>
            <div class="field" data-help-key="tds_floor">
              <div class="label-row">
                <label for="tds_floor">TDS Floor</label>
                <button class="hint-button" type="button" data-help-target="tds_floor">?</button>
              </div>
              <input id="tds_floor" name="tds_floor" type="number" step="0.01" value="0.80">
            </div>
            <div class="field full" data-help-key="altitude">
              <div class="label-row">
                <label for="altitude">海拔 m</label>
                <button class="hint-button" type="button" data-help-target="altitude">?</button>
              </div>
              <input id="altitude" name="altitude" type="number" step="1" value="0">
            </div>
          </div>
          <button id="submit-button" class="primary-button" type="submit">開始最佳化</button>
        </form>
        <aside id="tooltip-card" class="tooltip-card" aria-live="polite">
          <h3 id="tooltip-title">參數說明</h3>
          <p id="tooltip-body">點任一欄位或問號按鈕，這裡會解釋它的意義、對模型的影響，以及何時需要調整。</p>
          <div id="tooltip-meta" class="tooltip-meta">目前尚未選取特定參數。</div>
        </aside>
      </section>

      <section class="panel">
        <div class="hero">
          <span class="eyebrow">AeroPress 4-Vector</span>
          <h1>把 CLI 變成可視化沖煮台</h1>
          <p class="muted">輸入水質、焙度與環境條件，立即得到最優配方、風味向量與圖形化比較。</p>
          <div id="summary" class="summary"></div>
        </div>
        <div class="radar-trigger-wrap">
          <button id="radar-trigger" class="radar-trigger" type="button" hidden>
            <strong>查看風味雷達圖</strong>
            <span class="muted">點擊展開大圖，並查看 AC / SW / PS / CA / CGA / MEL 的意義說明。</span>
          </button>
        </div>
        <div id="results" class="results">
          <div class="empty">尚未執行最佳化。</div>
        </div>
      </section>
    </main>

    <div id="radar-modal" class="modal" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="radar-modal-title">
        <div class="modal-head">
          <div>
            <span class="eyebrow">Flavor Radar</span>
            <h2 id="radar-modal-title">風味雷達圖與參數說明</h2>
            <p class="muted">比較前三名沖煮組合在六個風味向量上的相對強度。</p>
          </div>
          <button id="radar-close" class="modal-close" type="button" aria-label="關閉">×</button>
        </div>
        <div class="modal-body">
          <div id="radar" class="radar-wrap"></div>
          <div id="radar-legend" class="radar-legend"></div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("optimize-form");
      const presetSelect = document.getElementById("preset");
      const ghInput = document.getElementById("gh");
      const khInput = document.getElementById("kh");
      const mgInput = document.getElementById("mg_frac");
      const submitButton = document.getElementById("submit-button");
      const summary = document.getElementById("summary");
      const resultsNode = document.getElementById("results");
      const radarTrigger = document.getElementById("radar-trigger");
      const radarModal = document.getElementById("radar-modal");
      const radarClose = document.getElementById("radar-close");
      const radarNode = document.getElementById("radar");
      const radarLegend = document.getElementById("radar-legend");
      const tooltipTitle = document.getElementById("tooltip-title");
      const tooltipBody = document.getElementById("tooltip-body");
      const tooltipMeta = document.getElementById("tooltip-meta");
      const presets = {{ presets|tojson }};
      const keys = ["AC", "SW", "PS", "CA", "CGA", "MEL"];
      let latestRadarResults = [];

      const compoundHelp = {
        AC: {
          label: "明亮酸質",
          body: "代表杯中的活潑酸感與前段亮度，越高通常越有清晰、立體的果酸表現。"
        },
        SW: {
          label: "甜感厚度",
          body: "代表甜味與圓潤度，影響口感是否飽滿、滑順，能平衡過尖的酸質。"
        },
        PS: {
          label: "正向香氣",
          body: "代表花香、果香與乾淨香氣的強度，通常越高越能拉出愉悅的香氣層次。"
        },
        CA: {
          label: "木質苦感",
          body: "代表偏木質、乾感的苦味來源，過高時容易讓尾韻變硬、變澀。"
        },
        CGA: {
          label: "綠感刺激",
          body: "代表生澀、草本與尖銳刺激感，通常在萃取失衡時會更明顯。"
        },
        MEL: {
          label: "焙烤厚苦",
          body: "代表焙烤、焦糖化後的厚重苦甜感，適量能增加深度，過高則容易壓味。"
        }
      };

      const fieldHelp = {
        brewer: {
          title: "機型 Brewer",
          body: "決定注水量與豆量搜尋範圍。`standard` 走 200ml / 9–18g；`xl` 走 400ml / 18–30g。這會直接影響注水延遲、粉水比、壓降與 TDS。",
          meta: "如果你用的是 AeroPress XL，這裡一定要選 `xl`。"
        },
        roast: {
          title: "焙度 Roast",
          body: "決定基準水溫、理想風味向量、MEL 苦味係數、Scorch 閾值與 TDS 偏好中心。這是整個模型最上游的風味分支。",
          meta: "焙度越深，最佳水溫通常越低，MEL / CGA 懲罰也更敏感。"
        },
        preset: {
          title: "水質快選 Preset",
          body: "快速帶入 GH、KH 與 Mg 比例。適合你已經知道自己使用 Aquacode、BWT 或特定礦泉水時，避免每次手動輸入。",
          meta: "選了 preset 後，下面的 GH / KH / Mg 會自動填入，你仍可再手動覆蓋。"
        },
        gh: {
          title: "GH 總硬度",
          body: "代表水中鈣鎂總量，直接影響萃取驅動力。太低會讓萃取偏弱，太高則可能讓風味變鈍或過度抽出苦澀。",
          meta: "模型中 GH 會修正整體 EY；一般中段可從 40–100 ppm 開始。"
        },
        kh: {
          title: "KH 碳酸鹽硬度",
          body: "代表水的緩衝能力，主要影響酸質感知。KH 越高，酸感越容易被中和，杯感會更鈍、更平。",
          meta: "模型中 KH 主要在評分層作用，不是直接改變 EY，而是改變 AC 感知。"
        },
        mg_frac: {
          title: "Mg 比例",
          body: "表示 GH 裡面有多少比例是鎂離子。Mg 較偏向拉高酸甜萃取，Ca 較偏向 body 與澀感，因此同樣 GH 下，Ca:Mg 組成會改變杯型。",
          meta: "0 代表幾乎全 Ca，1 代表幾乎全 Mg；一般自來水常落在 0.3–0.5。"
        },
        top: {
          title: "Top N",
          body: "控制要顯示幾組最佳結果。數字越大，你能比較更多候選解，但畫面會更長，計算後傳回的資料也更多。",
          meta: "通常 3 很夠用；若你要看更多邊界解，可以拉到 5 或 10。"
        },
        t_env: {
          title: "室溫 T_ENV",
          body: "用來計算咖啡粉初始溫度與冷卻曲線終態。室溫越低，長浸泡下的平均萃取溫度會更快下降。",
          meta: "冬天、冷氣房、山區都值得調整；它會同時影響 t_slurry 與 T_avg。"
        },
        tds_floor: {
          title: "TDS Floor",
          body: "你個人對『褐水』的最低可接受濃度下限。若結果低於這個值，評分會被額外二次衰減，避免過稀配方誤衝高分。",
          meta: "預設 0.80；如果你特別討厭稀薄口感，可以再往上調。"
        },
        altitude: {
          title: "海拔 Altitude",
          body: "用來修正當地沸點。海拔越高，水的實際沸點越低，模型會同步壓低可搜尋的最高水溫。",
          meta: "平地幾乎可忽略；山區沖煮時影響很大，例如 2000m 左右沸點會降到約 93°C。"
        }
      };

      function showHelp(key) {
        const entry = fieldHelp[key];
        if (!entry) return;
        tooltipTitle.textContent = entry.title;
        tooltipBody.textContent = entry.body;
        tooltipMeta.textContent = entry.meta;
      }

      presetSelect.addEventListener("change", () => {
        const selected = presetSelect.value;
        if (selected && presets[selected]) {
          ghInput.value = presets[selected].gh;
          khInput.value = presets[selected].kh;
          mgInput.value = presets[selected].mg_frac;
        }
        showHelp("preset");
      });

      document.querySelectorAll("[data-help-key] input, [data-help-key] select").forEach((element) => {
        const key = element.closest("[data-help-key]").dataset.helpKey;
        element.addEventListener("focus", () => showHelp(key));
        element.addEventListener("change", () => showHelp(key));
        element.addEventListener("click", () => showHelp(key));
      });

      document.querySelectorAll("[data-help-target]").forEach((button) => {
        button.addEventListener("click", () => showHelp(button.dataset.helpTarget));
      });

      function formatTime(seconds) {
        const total = Math.round(seconds);
        return `${Math.floor(total / 60)}:${String(total % 60).padStart(2, "0")}`;
      }

      function metricCard(label, value) {
        return `<div class="chip"><strong>${label}</strong><div>${value}</div></div>`;
      }

      function buildRadarSvg(results) {
        if (!results.length) {
          return "";
        }
        const size = 420;
        const center = size / 2;
        const radius = 142;
        const maxByKey = Object.fromEntries(keys.map((key) => [key, Math.max(...results.map((item) => item.compounds_abs[key]), 1e-8)]));
        const rings = [0.25, 0.5, 0.75, 1.0];
        const series = results.slice(0, 3).map((result, index) => {
          const points = keys.map((key, idx) => {
            const angle = (Math.PI * 2 * idx) / keys.length - Math.PI / 2;
            const normalized = result.compounds_abs[key] / maxByKey[key];
            const x = center + Math.cos(angle) * radius * normalized;
            const y = center + Math.sin(angle) * radius * normalized;
            return `${x},${y}`;
          }).join(" ");
          const color = ["#bb5f2a", "#4e6b5b", "#8f4667"][index] || "#555";
          return `<polygon points="${points}" fill="${color}22" stroke="${color}" stroke-width="2"></polygon>`;
        }).join("");
        const spokes = keys.map((key, idx) => {
          const angle = (Math.PI * 2 * idx) / keys.length - Math.PI / 2;
          const x = center + Math.cos(angle) * radius;
          const y = center + Math.sin(angle) * radius;
          const lx = center + Math.cos(angle) * (radius + 28);
          const ly = center + Math.sin(angle) * (radius + 28);
          return `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="#d8c7b7"></line><text x="${lx}" y="${ly}" text-anchor="middle" font-size="13" fill="#6d6358">${key}</text>`;
        }).join("");
        const ringSvg = rings.map((ring) => {
          const points = keys.map((_, idx) => {
            const angle = (Math.PI * 2 * idx) / keys.length - Math.PI / 2;
            const x = center + Math.cos(angle) * radius * ring;
            const y = center + Math.sin(angle) * radius * ring;
            return `${x},${y}`;
          }).join(" ");
          return `<polygon points="${points}" fill="none" stroke="#e4d7cb"></polygon>`;
        }).join("");
        return `<svg viewBox="0 0 ${size} ${size}">${ringSvg}${spokes}${series}</svg>`;
      }

      function closeRadarModal() {
        radarModal.hidden = true;
        document.body.style.overflow = "";
      }

      function openRadarModal() {
        if (!latestRadarResults.length) return;
        radarNode.innerHTML = buildRadarSvg(latestRadarResults);
        radarLegend.innerHTML = keys.map((key) => radarLegendCard(key)).join("");
        radarModal.hidden = false;
        document.body.style.overflow = "hidden";
      }

      function updateRadarTrigger(results) {
        latestRadarResults = results.slice(0, 3);
        radarTrigger.hidden = !latestRadarResults.length;
        if (!latestRadarResults.length) {
          closeRadarModal();
        } else if (!radarModal.hidden) {
          openRadarModal();
        }
      }

      function compoundCard(key, value) {
        const help = compoundHelp[key];
        return `
          <div class="compound" title="${help.label}">
            <strong>${key}</strong>
            <div>${value.toFixed(4)}</div>
            <div class="compound-note">${help.label}: ${help.body}</div>
          </div>
        `;
      }

      function radarLegendCard(key) {
        const help = compoundHelp[key];
        return `
          <div class="legend-item">
            <strong>${key} - ${help.label}</strong>
            <div class="muted">${help.body}</div>
          </div>
        `;
      }

      function renderResults(payload) {
        const { meta, results } = payload;
        summary.innerHTML = [
          metricCard("焙度", `${meta.roast_name} (${meta.roast_code})`),
          metricCard("水質", `GH ${meta.water_gh} / KH ${meta.water_kh}`),
          metricCard("Mg 比例", meta.water_mg_frac),
          metricCard("TDS Floor", meta.tds_floor),
        ].join("");

        if (!results.length) {
          resultsNode.innerHTML = `<div class="empty">沒有可用結果。</div>`;
          updateRadarTrigger([]);
          return;
        }

        resultsNode.innerHTML = results.map((result, index) => `
          <article class="result-card">
            <div class="result-head">
              <div>
                <div class="muted">Rank ${index + 1}</div>
                <h2 style="margin:4px 0 0">Temp ${result.temp}°C / Dial ${result.dial} / Dose ${result.dose}g</h2>
              </div>
              <div class="score">${result.score.toFixed(1)}</div>
            </div>
            <div class="metrics">
              <div class="metric"><strong>Steep</strong><div>${formatTime(result.steep_sec)}</div></div>
              <div class="metric"><strong>EY</strong><div>${result.ey.toFixed(3)}%</div></div>
              <div class="metric"><strong>TDS</strong><div>${result.tds.toFixed(4)}%</div></div>
              <div class="metric"><strong>T_slurry</strong><div>${result.t_slurry.toFixed(1)}°C</div></div>
            </div>
            <div class="metrics">
              <div class="ratio"><strong>AC/SW</strong><div>${result.ratios.ac_sw_actual} / ideal ${result.ratios.ac_sw_ideal}</div></div>
              <div class="ratio"><strong>PS/Bitter</strong><div>${result.ratios.ps_bitter_actual} / ideal ${result.ratios.ps_bitter_ideal}</div></div>
              <div class="ratio"><strong>Press</strong><div>${result.press_sec}s</div></div>
              <div class="ratio"><strong>Contact</strong><div>${formatTime(result.total_contact_sec)}</div></div>
            </div>
            <div class="compound-grid">
              ${keys.map((key) => compoundCard(key, result.compounds_abs[key])).join("")}
            </div>
          </article>
        `).join("");

        updateRadarTrigger(results);
      }

      radarTrigger.addEventListener("click", openRadarModal);
      radarClose.addEventListener("click", closeRadarModal);
      radarModal.addEventListener("click", (event) => {
        if (event.target === radarModal) {
          closeRadarModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !radarModal.hidden) {
          closeRadarModal();
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        submitButton.textContent = "計算中…";
        const payload = Object.fromEntries(new FormData(form).entries());
        ["gh", "kh", "mg_frac", "top", "t_env", "tds_floor", "altitude"].forEach((key) => {
          payload[key] = payload[key] === "" ? null : Number(payload[key]);
        });

        try {
          const response = await fetch("/api/optimize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          renderResults(data);
        } catch (error) {
          resultsNode.innerHTML = `<div class="empty">計算失敗：${error}</div>`;
          updateRadarTrigger([]);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "開始最佳化";
        }
      });
    </script>
  </body>
</html>
